<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: http://localhost:* http://127.0.0.1:*" />
  <title>Blueberry Sidebar</title>
  <style>
    :root { --background: 255 255 255; --foreground: 20 20 20; }
    .dark { --background: 20 20 20; --foreground: 250 250 250; }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: rgb(var(--background));
      color: rgb(var(--foreground));
      height: 100vh;
      overflow: hidden;
    }
  </style>
  <script>
    try {
      var dm = localStorage.getItem('darkMode');
      if (dm === 'true' || (!dm && matchMedia('(prefers-color-scheme:dark)').matches))
        document.documentElement.classList.add('dark');
    } catch(e){}
  </script>
</head>
<body>
  <div id="root">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:rgb(20,20,20)">
      <div style="width:20px;height:20px;border:2px solid rgba(99,102,241,0.3);border-top-color:rgb(99,102,241);border-radius:50%;animation:spin 0.6s linear infinite"></div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>
  <script type="module" src="./src/main.tsx"></script>
</body>
</html>
