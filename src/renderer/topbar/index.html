<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: http://localhost:* http://127.0.0.1:*" />
  <title>Blueberry TopBar</title>
  <style>
    :root { --background: 255 255 255; --foreground: 20 20 20; --muted: 245 245 245; }
    .dark { --background: 20 20 20; --foreground: 250 250 250; --muted: 40 40 40; }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: rgb(var(--background));
      color: rgb(var(--foreground));
      height: 100vh;
      overflow: hidden;
    }
  </style>
  <script>
    try {
      var dm = localStorage.getItem('darkMode');
      if (dm === 'true' || (!dm && matchMedia('(prefers-color-scheme:dark)').matches))
        document.documentElement.classList.add('dark');
    } catch(e){}
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./src/main.tsx"></script>
</body>
</html>
